<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OptiVerse AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen relative">
    
    <div class="absolute top-0 left-0 w-full h-full bg-pattern pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[120px]"></div>

    <div class="glass p-10 rounded-3xl w-full max-w-md slide-up relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
            <p class="text-slate-400">Join OptiVerse AI Network</p>
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Full Name</label>
                <input type="text" id="fullName" required 
                    class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                    placeholder="Dr. John Doe">
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                    placeholder="name@clinic.com">
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required 
                    class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                    placeholder="Create a strong password">
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-medium mb-2">Account Type</label>
                <div class="relative">
                    <select id="accountType" class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 appearance-none transition">
                        <option value="Doctor">Doctor / Specialist</option>
                        <option value="Institution">Medical Institution</option>
                        <option value="Researcher">Researcher</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition shadow-lg shadow-blue-600/25 mt-2">
                Create Account
            </button>
        </form>

        <p class="text-center text-slate-400 mt-6 text-sm">
            Already a member? 
            <a href="login.html" class="text-blue-400 hover:text-blue-300 font-medium transition">Login</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
